<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Smart — Doors & Windows</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script>
const SHEETS_URL    = 'https://script.google.com/macros/s/AKfycbz7Yjv4HlbBNx4CiXI5BNqH5i1kdUIxOb8uy74kPUMeqRbSpovs6tKZiSOPNA8T9cfYrw/exec';
const SESSION_TTL   = 24 * 60 * 60 * 1000;
const OWNER_WHATSAPP = '918919007089';
</script>
<style>
*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
}
:root {
  --o: #FF6B00;
  --o2: #FF8C3A;
  --o-bg: #FFF4EC;
  --o-border: #FFD4B0;
  --navy: #1A1A2E;
  --text: #0F172A;
  --text2: #64748B;
  --text3: #94A3B8;
  --border: #E2E8F0;
  --bg: #F8FAFC;
  --white: #FFFFFF;
  --green: #16A34A;
  --red: #EF4444;
  --radius: 14px;
  --shadow: 0 4px 24px rgba(15,23,42,0.08);
}
html, body {
  min-height: 100dvh;
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* ══════════════════════════════════════
   PAGE WRAPPER
══════════════════════════════════════ */
.page {
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
}

/* ══════════════════════════════════════
   CARD
══════════════════════════════════════ */
.card {
  background: var(--white);
  border-radius: 24px;
  width: 100%;
  max-width: 420px;
  box-shadow: var(--shadow), 0 0 0 1px rgba(15,23,42,0.04);
  overflow: hidden;
  animation: rise 0.5s cubic-bezier(0.16,1,0.3,1) both;
}

@keyframes rise {
  from { opacity: 0; transform: translateY(24px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── CARD TOP — brand strip ── */
.card-top {
  background: var(--o-bg);
  padding: 28px 32px 24px;
  border-bottom: 1px solid var(--o-border);
  position: relative;
  overflow: hidden;
}

/* Window pane decorations in background */
.card-top::before {
  content: '';
  position: absolute;
  right: -16px; top: -16px;
  width: 80px; height: 80px;
  background: var(--o);
  opacity: 0.06;
  border-radius: 6px;
  transform: rotate(15deg);
}
.card-top::after {
  content: '';
  position: absolute;
  right: 28px; top: 28px;
  width: 40px; height: 40px;
  border: 2px solid var(--o);
  opacity: 0.12;
  border-radius: 4px;
  transform: rotate(15deg);
}

/* 2B-1 logo — window panes + stacked name */
.logo {
  display: flex;
  align-items: center;
  gap: 14px;
  position: relative;
  z-index: 1;
}

/* Four pane icon */
.panes {
  flex-shrink: 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  width: 44px; height: 44px;
  border-radius: 8px;
  overflow: hidden;
  position: relative;
}
.pane {
  width: 100%; height: 100%;
}
.pane-1 { background: var(--o); }
.pane-2 { background: var(--o); opacity: 0.38; }
.pane-3 { background: var(--o); opacity: 0.38; }
.pane-4 { background: var(--navy); }
/* White cross dividers */
.panes-cross {
  position: absolute; inset: 0; pointer-events: none;
}
.panes-cross::before {
  content: '';
  position: absolute;
  left: 0; right: 0; top: 50%;
  height: 2.5px; background: white;
  transform: translateY(-50%);
}
.panes-cross::after {
  content: '';
  position: absolute;
  top: 0; bottom: 0; left: 50%;
  width: 2.5px; background: white;
  transform: translateX(-50%);
}

/* Brand name */
.brand {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.brand-smart {
  font-size: 22px;
  font-weight: 800;
  color: var(--navy);
  letter-spacing: 2.5px;
  line-height: 1;
}
.brand-divider {
  width: 100%;
  height: 1.5px;
  background: var(--o);
  margin: 4px 0;
  border-radius: 1px;
}
.brand-sub {
  font-size: 8.5px;
  font-weight: 700;
  color: var(--o);
  letter-spacing: 2.5px;
  text-transform: uppercase;
}
.brand-estd {
  font-size: 7px;
  font-weight: 400;
  color: var(--text3);
  letter-spacing: 2.5px;
  margin-top: 2px;
}

/* ── CARD BODY ── */
.card-body {
  padding: 28px 32px 32px;
}

/* Mode heading */
.mode-head {
  margin-bottom: 22px;
}
.mode-head h2 {
  font-size: 20px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.3px;
  margin-bottom: 4px;
}
.mode-head p {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.5;
}

/* Screens */
.scr { display: none; }
.scr.on { display: block; }

/* Fields */
.field {
  margin-bottom: 14px;
}
.field label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  letter-spacing: 0.2px;
  margin-bottom: 6px;
}
.field-inner { position: relative; }
.field input {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 14px;
  color: var(--text);
  background: var(--bg);
  transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  -webkit-appearance: none;
}
.field input:focus {
  outline: none;
  border-color: var(--o);
  background: var(--white);
  box-shadow: 0 0 0 3px rgba(255,107,0,0.1);
}
.field input.with-btn { padding-right: 46px; }
.eye-btn {
  position: absolute;
  right: 12px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  cursor: pointer;
  font-size: 15px;
  line-height: 1;
  padding: 4px;
  color: var(--text3);
}

/* CTA button */
.cta {
  width: 100%;
  padding: 14px;
  background: var(--o);
  color: white;
  border: none;
  border-radius: 12px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.2px;
  transition: background 0.18s, transform 0.12s;
  margin-top: 6px;
}
.cta:hover { background: var(--o2); }
.cta:active { transform: scale(0.98); }

/* Back button */
.back-btn {
  background: none;
  border: none;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  cursor: pointer;
  padding: 0;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.back-btn:hover { color: var(--text); }

/* Message */
.msg {
  font-size: 13px;
  font-weight: 500;
  min-height: 20px;
  margin-bottom: 10px;
  line-height: 1.5;
}
.msg.err  { color: var(--red); }
.msg.ok   { color: var(--green); }

/* Helper links below CTA */
.helper-links {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  margin-top: 16px;
}
.helper-links a {
  font-size: 13px;
  font-weight: 500;
  text-decoration: none;
  cursor: pointer;
}
.helper-links .link-primary {
  color: var(--o);
}
.helper-links .link-muted {
  color: var(--text3);
}
.helper-links .link-muted:hover {
  color: var(--text2);
}

/* Overlay */
.overlay {
  display: none;
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(248,250,252,0.88);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  align-items: center; justify-content: center;
}
.overlay.on { display: flex; }
.ov-inner { text-align: center; }
.spin {
  width: 38px; height: 38px;
  border: 3px solid var(--o-border);
  border-top-color: var(--o);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
  margin: 0 auto 14px;
}
.ov-inner p {
  font-size: 14px; font-weight: 500;
  color: var(--text2);
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Footer note */
.footer-note {
  text-align: center;
  padding-top: 20px;
  font-size: 11.5px;
  color: var(--text3);
}
</style>
</head>
<body>

<!-- Overlay -->
<div class="overlay" id="ov">
  <div class="ov-inner">
    <div class="spin"></div>
    <p id="ov-msg">Please wait...</p>
  </div>
</div>

<div class="page">
  <div class="card">

    <!-- Brand strip -->
    <div class="card-top">
      <div class="logo">
        <div class="panes">
          <div class="pane pane-1"></div>
          <div class="pane pane-2"></div>
          <div class="pane pane-3"></div>
          <div class="pane pane-4"></div>
          <div class="panes-cross"></div>
        </div>
        <div class="brand">
          <div class="brand-smart">SMART</div>
          <div class="brand-divider"></div>
          <div class="brand-sub">Doors &amp; Windows</div>
          <div class="brand-estd">ESTD. 2016</div>
        </div>
      </div>
    </div>

    <!-- Form body -->
    <div class="card-body">

      <!-- ── SIGN IN ── -->
      <div class="scr on" id="scr-login">
        <div class="mode-head">
          <h2>Sign in</h2>
          <p>Enter your credentials to continue</p>
        </div>
        <div class="field">
          <label>Username</label>
          <div class="field-inner">
            <input type="text" id="l-user" placeholder="Your username"
              autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false">
          </div>
        </div>
        <div class="field">
          <label>Password</label>
          <div class="field-inner">
            <input type="password" id="l-pass" class="with-btn"
              placeholder="Your password" autocomplete="current-password">
            <button class="eye-btn" onclick="eye('l-pass',this)" type="button">👁</button>
          </div>
        </div>
        <div class="msg" id="l-msg"></div>
        <button class="cta" onclick="doLogin()">Sign In</button>
        <div class="helper-links">
          <a class="link-primary" onclick="goTab('changepw')">🔑 Change Password</a>
          <a class="link-muted" href="https://wa.me/918919007089" target="_blank" rel="noopener">Forgot password? Contact Owner on WhatsApp →</a>
        </div>
      </div>

      <!-- ── CHANGE PASSWORD ── -->
      <div class="scr" id="scr-changepw">
        <button class="back-btn" onclick="goTab('login')">← Back to Sign In</button>
        <div class="mode-head">
          <h2>Change password</h2>
          <p>Enter your username and PIN to set a new password</p>
        </div>
        <div class="field">
          <label>Username</label>
          <div class="field-inner">
            <input type="text" id="cp-user" placeholder="Your username"
              autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false">
          </div>
        </div>
        <div class="field">
          <label>PIN (4 digits)</label>
          <div class="field-inner">
            <input type="text" id="cp-pin" inputmode="numeric" maxlength="4"
              placeholder="Enter your 4-digit PIN" autocomplete="off">
          </div>
        </div>
        <div class="field">
          <label>New Password</label>
          <div class="field-inner">
            <input type="password" id="cp-newpass" class="with-btn"
              placeholder="Min. 6 characters" autocomplete="new-password">
            <button class="eye-btn" onclick="eye('cp-newpass',this)" type="button">👁</button>
          </div>
        </div>
        <div class="field">
          <label>Confirm New Password</label>
          <div class="field-inner">
            <input type="password" id="cp-confirm" class="with-btn"
              placeholder="Repeat new password" autocomplete="new-password">
            <button class="eye-btn" onclick="eye('cp-confirm',this)" type="button">👁</button>
          </div>
        </div>
        <div class="msg" id="cp-msg"></div>
        <button class="cta" onclick="doChangePassword()">Update Password</button>
      </div>

    </div><!-- /card-body -->

    <div class="footer-note">
      Smart Doors &amp; Windows &nbsp;·&nbsp; Visakhapatnam
    </div>

  </div><!-- /card -->
</div><!-- /page -->

<script>
// ── Session check — redirect if already logged in ──
(function(){
  try {
    var s = localStorage.getItem('sdw_session');
    if (!s) return;
    var sess = JSON.parse(s);
    if (sess.expiry > Date.now()) window.location.href = 'app.html';
    else localStorage.removeItem('sdw_session');
  } catch(e){ localStorage.removeItem('sdw_session'); }
})();

// ── Tab switching ──
function goTab(t) {
  ['login','changepw'].forEach(function(id){
    var el = document.getElementById('scr-'+id);
    if (el) el.classList.toggle('on', id===t);
  });
  clearMsgs();
  setTimeout(function(){
    var f = document.querySelector('.scr.on input');
    if (f) f.focus();
  }, 60);
}

function clearMsgs(){
  ['l-msg','cp-msg'].forEach(function(id){
    var el = document.getElementById(id);
    if (el){ el.textContent=''; el.className='msg'; }
  });
}

function msg(id, txt, type){
  var el = document.getElementById(id);
  if (!el) return;
  el.textContent = txt;
  el.className = 'msg '+(type||'err');
}

function eye(id, btn){
  var inp = document.getElementById(id);
  if (!inp) return;
  inp.type = inp.type==='password' ? 'text' : 'password';
  btn.textContent = inp.type==='password' ? '👁' : '🙈';
}

function showOv(m){
  document.getElementById('ov-msg').textContent = m||'Please wait...';
  document.getElementById('ov').classList.add('on');
}
function hideOv(){ document.getElementById('ov').classList.remove('on'); }

function saveSession(u){
  localStorage.setItem('sdw_session', JSON.stringify({
    username: u.username, name: u.name,
    role: u.role, expiry: Date.now()+SESSION_TTL
  }));
}

async function api(payload){
  var r = await fetch(SHEETS_URL,{
    method:'POST', headers:{'Content-Type':'text/plain'},
    body: JSON.stringify(payload)
  });
  var t = await r.text();
  try{ return JSON.parse(t); }catch(e){ return {error:'Server error'}; }
}

// ── Login ──
async function doLogin(){
  var u = document.getElementById('l-user').value.trim();
  var p = document.getElementById('l-pass').value;
  if (!u||!p){ msg('l-msg','Please enter username and password'); return; }
  showOv('Signing you in...');
  try{
    var r = await api({action:'loginUser', username:u, password:p});
    hideOv();
    if (r.status==='ok'){
      saveSession(r.user);
      window.location.href='app.html';
    } else if (r.status==='inactive'){
      msg('l-msg','🚫 Account deactivated. Contact owner.');
    } else {
      msg('l-msg', r.error||'Invalid username or password');
    }
  } catch(e){ hideOv(); msg('l-msg','Connection error. Try again.'); }
}

// ── Change Password ──
async function doChangePassword(){
  var u       = document.getElementById('cp-user').value.trim();
  var pin     = document.getElementById('cp-pin').value.trim();
  var newpass = document.getElementById('cp-newpass').value;
  var confirm = document.getElementById('cp-confirm').value;

  if (!u)                    { msg('cp-msg','Please enter your username'); return; }
  if (!pin)                  { msg('cp-msg','Please enter your PIN'); return; }
  if (!/^\d{4}$/.test(pin))  { msg('cp-msg','PIN must be 4 digits'); return; }
  if (!newpass)              { msg('cp-msg','Please enter a new password'); return; }
  if (newpass.length < 6)    { msg('cp-msg','Password must be at least 6 characters'); return; }
  if (newpass !== confirm)   { msg('cp-msg','Passwords do not match'); return; }

  showOv('Updating password...');
  try{
    var r = await api({action:'resetPasswordWithPin', username:u, pin:pin, newPassword:newpass});
    hideOv();
    if (r.status==='ok'){
      msg('cp-msg','✅ Password updated! Please sign in.','ok');
      setTimeout(function(){ goTab('login'); }, 1500);
    } else {
      msg('cp-msg', r.error||'Invalid username or PIN');
    }
  } catch(e){ hideOv(); msg('cp-msg','Connection error. Try again.'); }
}

// ── Enter key support ──
document.addEventListener('keydown', function(e){
  if (e.key!=='Enter') return;
  var scr = document.querySelector('.scr.on');
  if (!scr) return;
  var id = scr.id;
  if (id==='scr-login')    doLogin();
  else if (id==='scr-changepw') doChangePassword();
});
</script>
</body>
</html>
